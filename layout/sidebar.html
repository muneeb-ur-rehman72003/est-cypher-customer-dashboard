<script>
  // Sidebar Active Starts
  $(window).on("load", function () {
    // get current URL without query/hash, lowercase
    var currentUrl = window.location.href
      .split("#")[0]
      .split("?")[0]
      .toLowerCase();

    var $links = $("#menu .sidebar-link a");
    var activeFound = false;

    $links.each(function () {
      // each link absolute href for comparison
      var linkUrl = this.href.split("#")[0].split("?")[0].toLowerCase();

      if (currentUrl.indexOf(linkUrl) !== -1) {
        // clear any previous active states
        $links.removeClass("active");
        $("#menu .sidebar-link").removeClass("active");

        // set active on this link + its wrapper
        $(this).addClass("active");
        $(this).closest(".sidebar-link").addClass("active");

        activeFound = true;
        return false; // break .each loop
      }
    });

    // fallback: if nothing matched, mark the first menu item active
    if (!activeFound) {
      var $first = $links.first();
      $first.addClass("active");
      $first.closest(".sidebar-link").addClass("active");
    }
  });
  // Sidebar Active Ends
</script>
